events {
    worker_connections 1024;
}

http {
    upstream flask_app {
        server web:5000;
    }

    # HTTP — certbot challenge + redirect to HTTPS
    server {
        listen 80;
        server_name powerbi.mozaicweb.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name powerbi.mozaicweb.com;

        ssl_certificate     /etc/letsencrypt/live/powerbi.mozaicweb.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/powerbi.mozaicweb.com/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        client_max_body_size 20M;

        location / {
            proxy_pass            http://flask_app;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
        }
    }
}
